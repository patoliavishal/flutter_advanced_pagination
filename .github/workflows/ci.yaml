name: CI

on:
  pull_request:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: dart analyze

      - name: Guard legacy files
        run: ./tool/ci/check_legacy_files.sh

      - name: Test
        run: flutter test
