name: advanced_pagination
description: "Controller-first pagination for Flutter with page/offset/cursor support, list/grid/sliver widgets, cache + prefetch, and customizable states."
version: 0.2.0
homepage: https://github.com/patoliavishal/flutter_advanced_pagination
repository: https://github.com/patoliavishal/flutter_advanced_pagination
issue_tracker: https://github.com/patoliavishal/flutter_advanced_pagination/issues
topics:
  - pagination
  - infinite-scroll
  - lazy-loading
  - load-more
  - pull-to-refresh

environment:
  sdk: ^3.11.0
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
